<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Traducción Árabe</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #f9f9f9; color: #333; }
        h1 { text-align: center; font-size: 1.5rem; }
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #resultado { background: white; padding: 15px; min-height: 60px; border-radius: 8px; border: 1px solid #ddd; white-space: pre-wrap; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Guía de Traducción Árabe</h1>
    
    <input type="password" id="apiKey" placeholder="Pega aquí tu API Key de Groq">
    <textarea id="textoEspanol" rows="4" placeholder="Escribe la frase en español para traducir al árabe..."></textarea>
    <button onclick="traducir()">Traducir</button>
    
    <h3>Resultado:</h3>
    <div id="resultado">Esperando texto...</div>

    <script>
        async function traducir() {
            const apiKey = document.getElementById('apiKey').value;
            const textoEspanol = document.getElementById('textoEspanol').value;
            const resultadoDiv = document.getElementById('resultado');

            if (!apiKey || !textoEspanol) {
                resultadoDiv.innerText = "Por favor, ingresa tu API Key y el texto en español.";
                return;
            }

            resultadoDiv.innerText = "Procesando...";

            const systemPrompt = `Actúa como un guía de idiomas. Cuando te pida una traducción al árabe (*Fusha*), responde exclusivamente con esta estructura mínima:

1. Traducción: [Frase simplificada]
2. Pronunciación: [Transliteración]
3. Escritura: [Árabe]
4. Uso: [Contexto breve]

No añadas saludos, introducciones ni explicaciones extra. Sé lo más directo posible.`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'groq/compound',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: textoEspanol }
                        ],
                        temperature: 0.2
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    resultadoDiv.innerText = data.choices[0].message.content;
                } else {
                    resultadoDiv.innerText = "Error: " + (data.error?.message || "Revisa tu API Key.");
                }
            } catch (error) {
                resultadoDiv.innerText = "Error de conexión. Verifica tu internet o tu API Key.";
            }
        }
    </script>
</body>
</html>
